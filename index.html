<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }

        .scan-line { position: absolute; width: 100%; height: 2px; background: #00ff00; opacity: 0.6; animation: scan 3s linear infinite; pointer-events: none; z-index: 10; box-shadow: 0 0 4px #00ff00; }
        @keyframes scan { 0% { top: 0; } 50% { top: 100%; } 100% { top: 0; } }
        
        /* 顶部识别文本浮层 */
        #topOverlay { position: absolute; top: 10px; left: 10px; right: 10px; background: rgba(0,0,0,0.75); color: #fff; padding: 12px; border-radius: 8px; font-size: 13px; max-height: 25vh; overflow-y: auto; backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.1); z-index: 20; }
        #recognizedText { color: #ddd; line-height: 1.4; }
        #matchInfo { margin-top: 8px; font-size: 11px; color: #aaa; }
        
        /* 底部答案浮层 - 巨大醒目 */

        #answerText { font-size: 32px; font-weight: bold; line-height: 1.2; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
        
        /* 配置面板 */
        #configPanel { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.4); z-index: 1000; width: 90%; max-width: 380px; }
        h3 { margin: 0 0 20px 0; text-align: center; color: #333; font-size: 20px; }
        .input-group { margin-bottom: 18px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; -webkit-appearance: none; }
        button { width: 100%; padding: 14px; background: #007bff; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        button:active { transform: scale(0.98); background: #0056b3; }
        .tip { font-size: 12px; color: #666; margin-top: 15px; line-height: 1.5; }
        
        /* 状态提示 */

</head>

let fuse;
let accessToken = '';
let isProcessing = false;
let lastAnswerTime = 0;
const RECOGNITION_INTERVAL = 600; // 600ms识别一次，平衡速度与准确率

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const recognizedTextDiv = document.getElementById('recognizedText');
const matchInfoDiv = document.getElementById('matchInfo');
const answerBar = document.getElementById('answerBar');
const answerText = document.getElementById('answerText');
const answerType = document.getElementById('answerType');
const statusDiv = document.getElementById('status');

// 初始化模糊搜索
function initFuse() {
    fuse = new Fuse(questions, {
        keys: ['question'],
        threshold: 0.35, // 0-1，越小越严格，0.35适合OCR误差
        includeScore: true,
        minMatchCharLength: 6,
        distance: 100
    });
    console.log(`题库加载完成，共${questions.length}道题`);
}

// 尝试加载外部data.json
async function loadExternalData() {
    try {
        const response = await fetch('data.json?v=' + Date.now());
        if (response.ok) {
            const externalData = await response.json();
            if (Array.isArray(externalData) && externalData.length > 20) {
                questions = externalData;
                initFuse();
                console.log(`外部题库加载成功：${questions.length}道题`);
                return true;
            }
        }
    } catch (e) {
        console.log('使用内置题库（如需加载完整357道题，请将data.json放在同目录）');
    }
    initFuse();
    return false;
}

// 初始化摄像头
async function initCamera() {
    try {
        const constraints = {
            video: {
                facingMode: { ideal: "environment" }, // 优先后置摄像头
                width: { ideal: 1280 },
                height: { ideal: 720 }
            },
            audio: false
        };
        
        const stream = await navigator.mediaDevices.getUserMedia(constraints);
        video.srcObject = stream;
        
        video.onloadedmetadata = () => {
            statusDiv.style.display = 'none';
            document.getElementById('configPanel').style.display = 'none';
            startRecognitionLoop();
        };
    } catch (err) {
        alert('摄像头启动失败：' + err.message + '\n请确保：1.使用HTTPS或localhost；2.已授予摄像头权限；3.使用Chrome/Safari浏览器');
        console.error(err);
    }
}

// 获取百度Token
async function getBaiduToken(apiKey, secretKey) {
    const url = `https://aip.baidubce.com/oauth/2.0/token?grant_type=client_credentials&client_id=${apiKey}&client_secret=${secretKey}`;
    try {
        const response = await fetch(url, { method: 'POST' });
        const data = await response.json();
        if (data.access_token) {
            accessToken = data.access_token;
            localStorage.setItem('baidu_api_key', apiKey);
            localStorage.setItem('baidu_secret_key', secretKey);
            return true;
        }
        throw new Error(data.error_description || '获取Token失败');
    } catch (err) {
        alert('API配置错误：' + err.message);
        return false;
    }
}

// OCR识别核心
async function recognizeText(imageBase64) {
    if (!accessToken || isProcessing) return null;
    isProcessing = true;
    
    try {
        const url = `https://aip.baidubce.com/rest/2.0/ocr/v1/accurate_basic?access_token=${accessToken}`;
        
        // 使用FormData避免URL过长
        const formData = new FormData();
        formData.append('image', imageBase64);
        formData.append('detect_direction', 'true');
        formData.append('probability', 'true');
        
        const response = await fetch(url, {
            method: 'POST',
            body: formData
        });
        
        const data = await response.json();
        
        if (data.words_result && data.words_result.length > 0) {
            // 合并所有识别文本
            const text = data.words_result.map(w => w.words).join('');
            return text;
        }
        return null;
    } catch (err) {
        console.error('OCR请求失败:', err);
        return null;
    } finally {
        setTimeout(() => { isProcessing = false; }, 200); // 防止请求过于频繁
    }
}

// 查找答案
function findAnswer(text) {
    if (!fuse || !text || text.length < 8) return; // 太短不处理
    
    const results = fuse.search(text);
    
    if (results.length > 0 && results[0].score < 0.4) { // 匹配度阈值
        const item = results[0].item;
        const score = ((1 - results[0].score) * 100).toFixed(0);
        
        // 更新UI
        recognizedTextDiv.textContent = text.substring(0, 50) + (text.length > 50 ? '...' : '');
        matchInfoDiv.textContent = `匹配度: ${score}% | 来源: ${item.source} | ID:${item.id}`;
        
        // 显示答案
        answerBar.style.display = 'block';
        answerType.textContent = item.type;
        
        if (item.type === '判断题') {
            answerText.textContent = item.answer;
            answerBar.style.background = item.answer === '正确' ? '#28a745' : '#dc3545'; // 绿/红
        } else {
            answerText.textContent = item.answer;
            answerBar.style.background = '#dc3545'; // 红色强调
        }
        
        lastAnswerTime = Date.now();
        
        // 5秒后隐藏答案（避免遮挡下一题）
        setTimeout(() => {
            if (Date.now() - lastAnswerTime >= 4900) {
                answerBar.style.display = 'none';
            }
        }, 5000);
        
        return true;
    }
    return false;
}

// 识别循环
function startRecognitionLoop() {
    setInterval(async () => {
        if (video.readyState === video.HAVE_ENOUGH_DATA && !isProcessing) {
            // 绘制视频帧到Canvas
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // 压缩为JPEG（0.6质量平衡速度与清晰度）
            const dataUrl = canvas.toDataURL('image/jpeg', 0.6);
            const base64 = dataUrl.split(',')[1];
            
            // 执行OCR
            const text = await recognizeText(base64);
            if (text) {
                findAnswer(text);
            }
        }
    }, RECOGNITION_INTERVAL);
}

// 初始化入口
async function initApp() {
    const apiKey = document.getElementById('apiKey').value.trim();
    const secretKey = document.getElementById('secretKey').value.trim();
    
    if (!apiKey || !secretKey) {
        alert('请输入完整的API Key和Secret Key');
        return;
    }
    
    statusDiv.textContent = '正在连接百度OCR...';
    statusDiv.style.display = 'block';
    
    const tokenOk = await getBaiduToken(apiKey, secretKey);
    if (tokenOk) {
        await loadExternalData(); // 加载题库
        initCamera(); // 启动摄像头
    }
}

// 页面加载时恢复缓存的Key
window.addEventListener('load', () => {
    const cachedKey = localStorage.getItem('baidu_api_key');
    const cachedSecret = localStorage.getItem('baidu_secret_key');
    if (cachedKey) document.getElementById('apiKey').value = cachedKey;
    if (cachedSecret) document.getElementById('secretKey').value = cachedSecret;
});
</script>
</body>
</html>
