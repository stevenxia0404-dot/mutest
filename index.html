<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>东航复习助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="./data.js"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .pt-safe { padding-top: env(safe-area-inset-top); }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans h-screen flex flex-col overflow-hidden">

    <header class="bg-white shadow-sm pt-safe pb-4 px-6 z-20">
        <div class="flex items-center mt-4">
            <button id="back-btn" onclick="showHome()" class="hidden mr-3 text-blue-600 font-bold">← 返回</button>
            <h1 id="page-title" class="text-xl font-black text-slate-800">乘务复习分类</h1>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto p-4 pb-safe">
        
        <div id="home-view" class="grid grid-cols-1 gap-4">
            <div onclick="filterCategory('飞行运行')" class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex justify-between items-center active:bg-slate-50 transition-colors">
                <div>
                    <h2 class="text-lg font-bold text-slate-700">飞行运行</h2>
                    <p class="text-sm text-slate-400 mt-1">证件、管理、各阶段程序</p>
                </div>
                <span class="text-slate-300 text-xl">→</span>
            </div>

            <div onclick="filterCategory('应急处置')" class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex justify-between items-center active:bg-slate-50 transition-colors">
                <div>
                    <h2 class="text-lg font-bold text-slate-700">应急处置</h2>
                    <p class="text-sm text-slate-400 mt-1">撤离、释压、火警控制</p>
                </div>
                <span class="text-slate-300 text-xl">→</span>
            </div>

            <div onclick="filterCategory('急救医学')" class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex justify-between items-center active:bg-slate-50 transition-colors">
                <div>
                    <h2 class="text-lg font-bold text-slate-700">急救医学</h2>
                    <p class="text-sm text-slate-400 mt-1">CPR、医疗处置、机上急救</p>
                </div>
                <span class="text-slate-300 text-xl">→</span>
            </div>

            <div onclick="filterCategory('野外求生')" class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex justify-between items-center active:bg-slate-50 transition-colors">
                <div>
                    <h2 class="text-lg font-bold text-slate-700">野外求生</h2>
                    <p class="text-sm text-slate-400 mt-1">陆地/水上生存、信号</p>
                </div>
                <span class="text-slate-300 text-xl">→</span>
            </div>

            <div onclick="filterCategory('机上设备')" class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex justify-between items-center active:bg-slate-50 transition-colors">
                <div>
                    <h2 class="text-lg font-bold text-slate-700">机上设备</h2>
                    <p class="text-sm text-slate-400 mt-1">灭火瓶、氧气、救生设备</p>
                </div>
                <span class="text-slate-300 text-xl">→</span>
            </div>

            <div onclick="filterCategory('全部')" class="mt-4 border-2 border-dashed border-slate-200 p-4 rounded-2xl text-center text-slate-400 font-bold active:bg-slate-100">
                查看全部 359 道题目
            </div>
        </div>

        <div id="list-view" class="hidden space-y-4">
            <div id="questions-container" class="space-y-4">
                </div>
        </div>

    </main>

    <script>
        const STORAGE_KEY = 'boluomate_mastered_list';
        let masteredIds = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

        function showHome() {
            document.getElementById('home-view').classList.remove('hidden');
            document.getElementById('list-view').classList.add('hidden');
            document.getElementById('back-btn').classList.add('hidden');
            document.getElementById('page-title').innerText = "乘务复习分类";
            window.scrollTo(0,0);
        }

        function filterCategory(cat) {
            const container = document.getElementById('questions-container');
            container.innerHTML = '';
            
            // 筛选题目
            let filtered = [];
            if (cat === '全部') {
                filtered = rawQuestionBank;
            } else {
                filtered = rawQuestionBank.filter(q => q.category === cat);
            }

            if (filtered.length === 0) {
                container.innerHTML = `<div class="text-center py-10 text-slate-400">该分类下暂无题目</div>`;
            }

            // 生成列表
            filtered.forEach(item => {
                const isMastered = masteredIds.includes(item.id);
                const card = document.createElement('div');
                card.className = `bg-white p-5 rounded-2xl shadow-sm border ${isMastered ? 'border-green-100 bg-green-50/30' : 'border-slate-100'}`;
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <span class="text-[10px] font-bold px-2 py-0.5 bg-slate-100 text-slate-400 rounded">${item.src}</span>
                        <button onclick="toggleMastered('${item.id}', this)" class="text-xs font-bold ${isMastered ? 'text-green-600' : 'text-blue-500'}">
                            ${isMastered ? '● 已掌握' : '○ 标记掌握'}
                        </button>
                    </div>
                    <p class="text-slate-700 font-medium leading-relaxed mb-3">${item.q}</p>
                    <div class="pt-3 border-t border-slate-50">
                        <p class="text-blue-600 font-bold text-sm">【答案】${item.a}</p>
                    </div>
                `;
                container.appendChild(card);
            });

            document.getElementById('home-view').classList.add('hidden');
            document.getElementById('list-view').classList.remove('hidden');
            document.getElementById('back-btn').classList.remove('hidden');
            document.getElementById('page-title').innerText = cat;
            window.scrollTo(0,0);
        }

        function toggleMastered(id, btn) {
            if (masteredIds.includes(id)) {
                masteredIds = masteredIds.filter(i => i !== id);
                btn.innerText = '○ 标记掌握';
                btn.className = 'text-xs font-bold text-blue-500';
                btn.closest('.bg-white').classList.remove('border-green-100', 'bg-green-50/30');
            } else {
                masteredIds.push(id);
                btn.innerText = '● 已掌握';
                btn.className = 'text-xs font-bold text-green-600';
                btn.closest('.bg-white').classList.add('border-green-100', 'bg-green-50/30');
            }
            localStorage.setItem(STORAGE_KEY, JSON.stringify(masteredIds));
        }

        // 载入检查
        window.onload = () => {
            if (typeof rawQuestionBank === 'undefined') {
                alert('未检测到 data.js，请确保文件已正确生成并存放。');
            }
        };
    </script>
</body>
</html>
