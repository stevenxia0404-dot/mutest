<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>开卷秒查宝</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="./data.js"></script>
    <style>
        body {
            -webkit-tap-highlight-color: transparent;
            background: linear-gradient(180deg, #f8faff 0%, #f3f6fc 100%);
        }
        .pt-safe { padding-top: env(safe-area-inset-top); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .tap-active {
            transition: transform .14s ease, box-shadow .2s ease, background-color .2s ease;
        }
        .tap-active:active { transform: scale(0.98); }
        .ios-glass {
            background: rgba(255, 255, 255, 0.78);
            -webkit-backdrop-filter: blur(16px) saturate(120%);
            backdrop-filter: blur(16px) saturate(120%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.65);
        }
        .ios-card {
            background: rgba(255, 255, 255, 0.88);
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 8px 24px rgba(16, 24, 40, 0.06), 0 1px 2px rgba(16, 24, 40, 0.04);
        }
        .ios-chip {
            background: rgba(240, 244, 255, 0.9);
            border: 1px solid rgba(220, 228, 248, 0.9);
        }
    </style>
</head>
<body class="text-slate-800 h-screen flex flex-col overflow-hidden">

    <header class="ios-glass pt-safe pb-3 px-4 z-50 flex items-center justify-between sticky top-0">
        <div class="flex items-center">
            <button id="back-btn" onclick="showDashboard()" class="hidden mr-3 text-blue-600 font-semibold bg-blue-50/90 px-3 py-1.5 rounded-full tap-active">← 选分类</button>
            <h1 id="page-title" class="text-[19px] font-semibold tracking-tight text-slate-800">分类导航</h1>
        </div>
        <span id="res-count" class="text-[11px] ios-chip text-slate-500 px-2.5 py-1 rounded-full font-medium">359 TOTAL</span>
    </header>

    <main id="main-scroll" class="flex-1 overflow-y-auto px-3 pt-3 pb-5">
        
        <div id="dashboard" class="space-y-6">
            </div>

        <div id="results-list" class="hidden space-y-3 pb-20">
            </div>

    </main>

    <script>
        // 核心配置：定义你的大类颜色，考试时一眼扫过去就能定位
        const categoryConfig = {
            '飞行运行': 'border-blue-500 text-blue-600',
            '应急处置': 'border-rose-500 text-rose-600',
            '急救医学': 'border-emerald-500 text-emerald-600',
            '机上设备': 'border-amber-500 text-amber-600',
            '野外求生': 'border-purple-500 text-purple-600'
        };

        function showDashboard() {
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('results-list').classList.add('hidden');
            document.getElementById('back-btn').classList.add('hidden');
            document.getElementById('page-title').innerText = "分类导航";
            document.getElementById('main-scroll').scrollTo(0,0);
        }

        function renderDashboard() {
            const dashboard = document.getElementById('dashboard');
            // 获取所有大类
            const categories = [...new Set(rawQuestionBank.map(q => q.category))];
            
            dashboard.innerHTML = categories.map(cat => {
                // 获取该大类下所有的细分小类
                const subs = [...new Set(rawQuestionBank.filter(q => q.category === cat).map(q => q.subCategory))];
                const colorClass = categoryConfig[cat] || 'border-slate-500 text-slate-600';
                
                return `
                    <div class="ios-card rounded-3xl p-4 border-t-4 ${colorClass.split(' ')[0]}">
                        <h3 class="font-semibold text-[15px] mb-3 text-slate-700">${cat}</h3>
                        <div class="grid grid-cols-2 gap-2">
                            ${subs.map(sub => `
                                <button onclick="renderList('${cat}', '${sub}')" 
                                        class="tap-active ios-chip p-3 rounded-2xl text-left hover:shadow-sm">
                                    <div class="text-[12px] font-semibold text-slate-700 leading-tight">${sub || '未分类'}</div>
                                    <div class="text-[10px] text-slate-400 mt-1">${rawQuestionBank.filter(q => q.category === cat && q.subCategory === sub).length} 题</div>
                                </button>
                            `).join('')}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderList(cat, sub) {
            const list = document.getElementById('results-list');
            const filtered = rawQuestionBank.filter(q => q.category === cat && q.subCategory === sub);
            
            document.getElementById('page-title').innerText = sub;
            document.getElementById('back-btn').classList.remove('hidden');
            document.getElementById('dashboard').classList.add('hidden');
            list.classList.remove('hidden');

            list.innerHTML = filtered.map(item => `
                <div class="ios-card p-4 rounded-3xl">
                    <div class="text-[10px] text-slate-400 font-medium mb-2">#${item.id} · ${item.src}</div>
                    <div class="text-slate-800 font-semibold leading-relaxed mb-3">${item.q}</div>
                    <div class="bg-gradient-to-br from-blue-50 to-indigo-50 border border-blue-100/70 p-3 rounded-2xl">
                        <div class="text-[10px] text-blue-500 font-semibold uppercase tracking-wider mb-1">Answer</div>
                        <div class="text-blue-700 font-semibold text-[18px] leading-relaxed">${item.a}</div>
                    </div>
                </div>
            `).join('');
            document.getElementById('main-scroll').scrollTo(0,0);
        }

        window.onload = () => {
            if (typeof rawQuestionBank !== 'undefined') {
                renderDashboard();
                document.getElementById('res-count').innerText = `${rawQuestionBank.length} QUES`;
            }
        };
    </script>
</body>
</html>
